  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Fondo nubes ── */
    .clouds {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 15% 25%, rgba(40,40,60,0.9) 0%, transparent 65%),
        radial-gradient(ellipse 60% 45% at 80% 15%, rgba(30,30,50,0.85) 0%, transparent 60%),
        radial-gradient(ellipse 80% 55% at 50% 75%, rgba(35,35,55,0.8) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 5% 85%, rgba(25,25,45,0.85) 0%, transparent 65%),
        radial-gradient(ellipse 65% 45% at 90% 60%, rgba(32,32,52,0.9) 0%, transparent 60%);
      filter: blur(40px);
    }
    .clouds2 {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 90% 30% at 40% 5%, rgba(20,20,38,0.7) 0%, transparent 65%),
        radial-gradient(ellipse 55% 60% at 88% 45%, rgba(22,22,40,0.75) 0%, transparent 60%),
        radial-gradient(ellipse 70% 35% at 3% 50%, rgba(18,18,35,0.7) 0%, transparent 65%);
      filter: blur(50px);
    }

    .content { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; }

    /* ── Hero ── */
    .hero { padding: 2rem 1.5rem 1.75rem; border-bottom: 0.5px solid #1e1e1e; }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px; color: #f2f2f2;
      letter-spacing: 4px; line-height: 1;
    }

    /* ── Filtros dinámicos ── */
    .filters-wrap { border-bottom: 0.5px solid #1a1a1a; position: relative; }
    .filter-toggle-btn {
      display: flex; align-items: center; gap: 8px;
      margin: 0.75rem 1.5rem;
      padding: 6px 14px; border-radius: 20px;
      border: 0.5px solid #2a2a2a; background: transparent;
      color: #aaa; font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .filter-toggle-btn:hover { border-color: #555; color: #ddd; }
    .filter-toggle-btn.active { border-color: #aaa; color: #e0e0e0; background: rgba(255,255,255,0.05); }
    #active-filter-label { font-size: 11px; color: #555; }
    .filter-panel {
      display: none; padding: 0.75rem 1.5rem 1rem;
      border-top: 0.5px solid #1a1a1a;
      background: rgba(255,255,255,0.015);
    }
    .filter-panel.open { display: block; }
    .filter-group-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #666; margin-bottom: 8px; }
    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      font-size: 11px; padding: 4px 12px; border-radius: 20px;
      border: 0.5px solid #444; background: transparent; color: #999;
      cursor: pointer; transition: all 0.15s;
    }
    .chip.active, .chip:hover { border-color: #555; color: #ddd; background: rgba(255,255,255,0.05); }

    .section-lbl { padding: 1.2rem 1.5rem 0.5rem; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #555; }

    /* ── Filas beats ── */
    .beat-row {
      display: grid; grid-template-columns: 44px 1fr auto;
      align-items: center; gap: 12px;
      padding: 0.85rem 1.5rem;
      border-bottom: 0.5px solid #141414;
      transition: background 0.12s;
    }
    .beat-row { cursor: pointer; }
    .beat-row:hover  { background: rgba(255,255,255,0.03); }
    .beat-row.expanded { background: rgba(255,255,255,0.04); }

    .beat-num { font-size: 12px; color: #555; text-align: center; font-variant-numeric: tabular-nums; }
    .beat-row:hover .beat-num, .beat-row.expanded .beat-num { display: none; }

    .play-btn {
      display: none; width: 34px; height: 34px; border-radius: 50%;
      background: #e0e0e0; border: none; cursor: pointer;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .beat-row:hover .play-btn, .beat-row.expanded .play-btn { display: flex; }
    .play-btn i { font-size: 13px; color: #0d0d0d; margin-left: 2px; }

    .beat-info { min-width: 0; }
    .beat-name { font-size: 13px; font-weight: 500; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .beat-name .atags { color: #777; font-weight: 400; font-size: 12px; }
    .beat-meta { font-size: 11px; color: #777; margin-top: 2px; }
    .beat-taglist { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
    .btag { font-size: 10px; padding: 2px 7px; border-radius: 3px; background: rgba(255,255,255,0.07); color: #888; border: 0.5px solid #333; }

    .beat-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .beat-price { font-size: 11px; color: #888; white-space: nowrap; }
    .expand-btn {
      background: none; border: 0.5px solid #2a2a2a; border-radius: 4px;
      color: #555; cursor: pointer; padding: 3px 8px; font-size: 11px;
      transition: all 0.15s; white-space: nowrap;
    }
    .expand-btn:hover { border-color: #555; color: #ccc; }

    /* ── Panel licencias ── */
    .license-panel {
      display: none;
      padding: 0.75rem 1.5rem 1.25rem 4.5rem;
      background: rgba(255,255,255,0.02);
      border-bottom: 0.5px solid #141414;
    }
    .license-panel.open { display: block; }

    .lic-section-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #666; margin-bottom: 8px; }

    .producers-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .prod-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px;
      border: 0.5px solid #444; background: rgba(255,255,255,0.05);
      color: #aaa; font-size: 11px; text-decoration: none; transition: all 0.15s;
    }
    .prod-pill:hover { border-color: #666; color: #e0e0e0; background: rgba(255,255,255,0.07); }
    .prod-pill i { font-size: 12px; }

    .lic-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 12px; }
    .lic-card {
      border: 0.5px solid #222; border-radius: 6px; padding: 10px 12px;
      background: rgba(255,255,255,0.025); cursor: pointer; transition: all 0.15s;
    }
    .lic-card:hover, .lic-card.selected { border-color: #555; background: rgba(255,255,255,0.06); }
    .lic-card.selected { border-color: #aaa; }
    .lic-type   { font-size: 11px; color: #aaa; font-weight: 500; }
    .lic-detail { font-size: 10px; color: #444; margin-top: 2px; }
    .lic-price-wrap { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .lic-price  { font-size: 14px; color: #e0e0e0; font-weight: 500; }
    .lic-price-orig { font-size: 12px; color: #555; text-decoration: line-through; }

    .tag-notice {
      font-size: 10px; color: #666; margin-bottom: 12px;
      padding: 7px 10px; border: 0.5px solid #1e1e1e;
      border-radius: 5px; background: rgba(255,255,255,0.02);
    }

    .contact-block { margin-top: 4px; }
    .contact-label { font-size: 11px; color: #777; margin-bottom: 8px; line-height: 1.5; }
    .contact-row { display: flex; gap: 8px; }
    .contact-btn {
      flex: 1; padding: 8px; border-radius: 6px;
      border: 0.5px solid #333; background: rgba(255,255,255,0.04);
      color: #aaa; font-size: 12px; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      text-decoration: none;
    }
    .contact-btn:hover { border-color: #666; color: #e0e0e0; background: rgba(255,255,255,0.08); }

    /* ── Player fijo ── */
    .player-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      display: none;
      background: rgba(10,10,10,0.94); backdrop-filter: blur(16px);
      border-top: 0.5px solid #222;
      padding: 10px 1.5rem;
      align-items: center; gap: 12px;
    }
    .player-bar.visible { display: flex; }
    .player-info { min-width: 0; flex: 0 0 auto; max-width: 160px; }
    .player-name { font-size: 12px; font-weight: 500; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-sub  { font-size: 10px; color: #777; }
    .prog-track  { flex: 1; height: 4px; background: #2a2a2a; border-radius: 2px; cursor: pointer; position: relative; }
    .prog-fill   { height: 100%; background: #c0c0c0; border-radius: 2px; width: 0%; transition: width 0.1s linear; }
    .prog-thumb  {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 12px; height: 12px; border-radius: 50%;
      background: #fff; left: 0%; margin-left: -6px;
      pointer-events: none; transition: left 0.1s linear;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
    }
    .pb-btn-info { color: #aaa !important; border: 0.5px solid #333; border-radius: 4px; padding: 3px 7px; font-size: 14px !important; }
    .pb-btn-info:hover { color: #fff !important; border-color: #888; }
    .time-lbl    { font-size: 10px; color: #777; font-variant-numeric: tabular-nums; min-width: 28px; }
    .stop-btn    { background: none; border: none; color: #555; cursor: pointer; font-size: 20px; padding: 0; }
    .stop-btn:hover { color: #ccc; }

    #catalog-wrap { padding-bottom: 64px; }

    @media (max-width: 480px) {
      .hero-title { font-size: 40px; }
      .lic-grid { grid-template-columns: 1fr; }
      .beat-row { grid-template-columns: 36px 1fr auto; padding: 0.75rem 1rem; }
      .license-panel { padding-left: 1rem; }
    }

    .player-controls { display: flex; align-items: center; gap: 6px; }
    .pb-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 16px; padding: 4px; transition: color 0.15s; }
    .pb-btn:hover { color: #ccc; }
    .pb-info-btn {
      background: none; border: 0.5px solid #333; border-radius: 4px;
      color: #888; cursor: pointer; font-size: 11px; padding: 4px 10px;
      transition: all 0.15s; display: flex; align-items: center; gap: 4px; white-space: nowrap;
    }
    .pb-info-btn:hover { border-color: #888; color: #e0e0e0; }
    .volume-wrap { display: flex; align-items: center; gap: 6px; }
    #vol-slider {
      -webkit-appearance: none; width: 70px; height: 2px;
      background: #333; border-radius: 2px; outline: none; cursor: pointer;
    }
    #vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 10px;
      border-radius: 50%; background: #aaa; cursor: pointer;
    }

    /* ── Hero mejorado ── */
    .hero { padding: 1.75rem 1.5rem 0; border-bottom: 0.5px solid #1e1e1e; }
    .hero-inner { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 12px; }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px; color: #ffffff; letter-spacing: 3px; line-height: 1;
    }
    .hero-nav { display: flex; gap: 6px; align-items: center; }
    .hero-nav-btn {
      font-size: 12px; padding: 6px 16px; border-radius: 20px;
      border: 0.5px solid #444; color: #999; text-decoration: none;
      transition: all 0.15s; background: transparent;
    }
    .hero-nav-btn:hover, .hero-nav-btn.active { border-color: #666; color: #e0e0e0; background: rgba(255,255,255,0.05); }
    .hero-nav-ig {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%;
      border: 0.5px solid #444; color: #888; text-decoration: none;
      font-size: 15px; transition: all 0.15s;
    }
    .hero-nav-ig:hover { border-color: #e1306c; color: #e1306c; background: rgba(225,48,108,0.08); }

    /* ── Buscador ── */
    .search-wrap {
      display: flex; align-items: center; gap: 10px;
      padding: 0.75rem 0; position: relative;
    }
    .search-icon { font-size: 14px; color: #666; flex-shrink: 0; }
    .search-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #ccc; font-size: 13px; font-family: 'Inter', sans-serif;
      border-bottom: 0.5px solid #1e1e1e; padding-bottom: 4px;
    }
    .search-input::placeholder { color: #555; }
    .search-input:focus { border-bottom-color: #444; }
    .search-clear { background: none; border: none; color: #333; cursor: pointer; font-size: 13px; }
    .search-clear:hover { color: #aaa; }

    /* ── Créditos ── */
    .credits-header { padding: 1.5rem 1.5rem 0.75rem; border-bottom: 0.5px solid #1e1e1e; }
    .credits-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: #f0f0f0; letter-spacing: 2px; }
    .credits-sub { font-size: 11px; color: #666; margin-top: 4px; }
    .credits-embeds { padding: 1rem 1.5rem; }
    .credits-footer { padding: 1.5rem; display: flex; justify-content: center; border-top: 0.5px solid #1e1e1e; }
    .credits-playlist-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px; border-radius: 24px;
      border: 0.5px solid #1db954; color: #1db954;
      font-size: 13px; text-decoration: none; transition: all 0.15s;
      background: rgba(29,185,84,0.05);
    }
    .credits-playlist-btn:hover { background: rgba(29,185,84,0.12); }
  </style>
</head>

  </div>

  <div class="player-bar" id="player-bar">
    <div class="player-info">
      <div class="player-name" id="pb-name">—</div>
      <div class="player-sub" id="pb-sub">—</div>
    </div>
    <div class="player-controls">
      <button class="pb-btn" onclick="prevPlay()" aria-label="Anterior" title="Anterior"><i class="ti ti-player-skip-back"></i></button>
      <button class="pb-btn" onclick="randomPlay()" aria-label="Aleatorio" title="Aleatorio"><i class="ti ti-arrows-shuffle"></i></button>
      <button class="pb-btn" onclick="togglePlay(currentPlay)" aria-label="Play/Pause" id="pb-playpause"><i class="ti ti-player-play"></i></button>
      <button class="pb-btn" onclick="nextPlay()" aria-label="Siguiente" title="Siguiente"><i class="ti ti-player-skip-forward"></i></button>

      <i class="ti ti-volume" style="font-size:13px;color:#777;"></i>
      <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)" />

    <button class="stop-btn" onclick="stopPlay()" aria-label="Detener"><i class="ti ti-player-stop"></i></button>

  <audio id="aud"></audio>

  <script>
    /* ════════════════════════════════════════════════════
       CONFIGURACIÓN — edita solo esta sección
    ════════════════════════════════════════════════════ */
    const INSTAGRAM   = "https://instagram.com/yvngrobv";
    const EMAIL       = "yvngrobvcontact@gmail.com";
    const PREV_SECS   = 35;  // duración del preview en segundos

    /*
      Formato de cada beat:
      ─────────────────────
      raw:    "nombre bpm @yvngrobv"                     → solo
              "nombre bpm @yvngrobv @otroprod"           → 2 productores
              "nombre bpm @yvngrobv @prod2 @prod3"       → 3 productores
      tags:   array de etiquetas — generan los filtros automáticamente
      file:   nombre del MP3 dentro de la carpeta /previews/
      colabs: array de handles — se construye el enlace de Instagram solo
              (si el handle tiene puntos como @roos.exe → instagram.com/roosxe)
    */
    const RAW_BEATS = [
  { id: 1, raw:"actionstar 142 @yvngrobv", tags:["Trap","Crank"], file:"actionstar 142 @yvngrobv.mp3", colabs:["@yvngrobv"] },
  { id: 2, raw:"arrhythmia 140 @yvngrobv", tags:["Trap","Crank"], file:"arrhythmia 140 @yvngrobv.mp3", colabs:["@yvngrobv"] },
  { id: 3, raw:"asshole 140 @yvngrobv", tags:["Trap","Atlanta"], file:"asshole 140 @yvngrobv.mp3", colabs:["@yvngrobv"] },
  { id: 4, raw:"beanbag 148 @yvngrobv", tags:["Trap","NewWave"], file:"beanbag 148 @yvngrobv.mp3", colabs:["@yvngrobv"] },
  { id: 5, raw:"bender 149 @yvngrobv @jtrn.the.producer", tags:["Trap","Chill"], file:"bender 149 @yvngrobv @jtrn.the.producer.mp3", colabs:["@yvngrobv","@jtrn.the.producer"] },
  { id: 6, raw:"birds 121 @yvngrobv @roos.exe", tags:["Trap","Atlanta","Old","Melancholic"], file:"birds 121 @yvngrobv @roos.exe.mp3", colabs:["@yvngrobv","@roos.exe"] },
  { id: 7, raw:"biting 166 @yvngrobv", tags:["Trap","NewWave"], file:"biting 166 @yvngrobv.mp3", colabs:["@yvngrobv"] },
  { id: 8, raw:"boo 131 @yvngrobv", tags:["Trap","NewWave"], file:"boo 131 @yvngrobv.mp3", colabs:["@yvngrobv"] },

    function handleToIG(handle) {
      const slug = handle.replace('@','');
      return `https://instagram.com/${slug}`;
    }

    function getLicenses(collabCount) {
      if (collabCount === 0) return [
        { id:'mp3-s', label:'MP3', detail:'Solo @yvngrobv', price:'30€', orig:'50€' },
        { id:'wav-s', label:'WAV', detail:'Solo @yvngrobv', price:'60€', orig:'80€' }
      ];
      if (collabCount === 1) return [
        { id:'mp3-2', label:'MP3', detail:'2 productores', price:'40€', orig:'60€' },
        { id:'wav-2', label:'WAV', detail:'2 productores', price:'80€', orig:'100€' }
      ];
      return [
        { id:'mp3-3', label:'MP3', detail:'3+ productores', price:'45€', orig:'65€' },
        { id:'wav-3', label:'WAV', detail:'3+ productores', price:'90€', orig:'110€' }
      ];
    }

    function parseBeat(b) {
      const atags      = b.raw.match(/@\S+/g) || [];
      const collabTags = atags.filter(t => t !== '@yvngrobv');
      const isCollab   = collabTags.length > 0;
      const noAt       = b.raw.replace(/@\S+/g, '').trim();
      const bpmMatch   = noAt.match(/\b(\d{2,3})\b/);
      const bpm        = bpmMatch ? bpmMatch[1] : '?';
      const name       = noAt.replace(/\b\d{2,3}\b/, '').trim().toUpperCase();
      const licenses   = getLicenses(collabTags.length);
      return { ...b, name, bpm, atags, isCollab, collabTags, licenses, fromPrice: licenses[0].price };
    }

      { name:"M.I.A", artists:"Holyuno, yvngrobv", url:"https://open.spotify.com/track/0hORTvVKE3ABlT3Himxr5z", img:"https://i.scdn.co/image/ab67616d0000485191ee7e1b5aceab03df53cb08" },

    ];

    function renderCredits() {
      document.getElementById('credits-list').innerHTML = CREDITS.map(c => `
        <a class="credit-row" href="${c.url}" target="_blank" rel="noopener">
          <img class="credit-cover" src="${c.img}" alt="${c.name}" loading="lazy" />
          <div class="credit-info">
            <div class="credit-name">${c.name}</div>
            <div class="credit-artists">${c.artists}</div>
          </div>
          <span class="credit-spotify"><i class="ti ti-brand-spotify"></i> Spotify</span>
        </a>
      `).join('');
    }

    function showSection(sec) {
      document.querySelectorAll('.hero-nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.hero-nav-btn[onclick="showSection('${sec}')"]`).classList.add('active');
      document.getElementById('catalog-wrap').style.display    = sec === 'catalog'  ? 'block' : 'none';
      document.getElementById('credits-wrap').style.display   = sec === 'credits'  ? 'block' : 'none';
      document.querySelector('.filters-wrap').style.display   = sec === 'catalog'  ? 'block' : 'none';
      document.querySelector('.section-lbl').style.display    = sec === 'catalog'  ? 'block' : 'none';

    }

    let searchQuery = '';
    function onSearch(val) {
      searchQuery = val.toLowerCase().trim();
      document.getElementById('search-clear').style.display = val ? 'block' : 'none';
      render();
    }
    function clearSearch() {
      document.getElementById('search-input').value = '';
      onSearch('');
    }

    /* ── Géneros principales ── */
    const MAIN_GENRES = ['Trap','R&B','Other Genres'];

    /* ── Filtros desplegables ── */
    function buildFilters() {
      const allTags = new Set();
      beats.forEach(b => b.tags.forEach(t => allTags.add(t)));
      const mainTags = [...allTags].filter(t => MAIN_GENRES.includes(t));
      const subTags  = [...allTags].filter(t => !MAIN_GENRES.includes(t)).sort();

      const makeChip = (t, label) =>
        `<div class="chip${currentFilter===t?' active':''}" onclick="filterBeats('${t}',this)">${label}</div>`;

      document.getElementById('filter-main').innerHTML =
        makeChip('all','All') + mainTags.map(t => makeChip(t,t)).join('');
      document.getElementById('filter-sub').innerHTML =
        subTags.map(t => makeChip(t,t)).join('');
    }

    function closeFilterPanel() {
      document.getElementById('filter-panel').classList.remove('open');
      document.getElementById('filter-toggle-btn').classList.remove('active');
    }

    function toggleFilterPanel() {
      const panel = document.getElementById('filter-panel');
      const btn   = document.getElementById('filter-toggle-btn');
      panel.classList.toggle('open');
      btn.classList.toggle('active');
    }

    let currentFilter = 'all', currentPlay = null, expandedId = null;
    let selectedLic = {}, timer = null, fakeSec = 0;

    function filterBeats(g, el) {
      if (currentFilter === g && g !== 'all') {
        // desactivar — volver a All
        currentFilter = 'all';
        document.querySelectorAll('.chip').forEach(c => {
          c.classList.remove('active');
          if (c.textContent.trim() === 'All') c.classList.add('active');
        });
        document.getElementById('active-filter-label').textContent = '';
      } else {
        currentFilter = g;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('active-filter-label').textContent = g === 'all' ? '' : '· ' + g;
      }
      render();
    }

    /* Cerrar panel al hacer clic fuera */
    document.addEventListener('click', function(e) {
      const panel = document.getElementById('filter-panel');
      const btn   = document.getElementById('filter-toggle-btn');
      if (!panel || !btn) return;
      if (!panel.contains(e.target) && !btn.contains(e.target)) {
        panel.classList.remove('open');
        btn.classList.remove('active');
      }
    });

    /* ── Render principal ── */
    function render() {
      const filtered = beats.filter(b => {
      const matchTag = currentFilter === 'all' || b.tags.includes(currentFilter);
      if (!searchQuery) return matchTag;
      const haystack = (b.name + ' ' + b.raw).toLowerCase();
      return matchTag && haystack.includes(searchQuery);
    });

      document.getElementById('catalog').innerHTML = filtered.map((b, i) => {

        /* Pastillas de productores */
        const pills = (b.colabs || []).map(handle =>
          `<a class="prod-pill" href="${handleToIG(handle)}" target="_blank" rel="noopener">
            <i class="ti ti-brand-instagram" aria-hidden="true"></i>${handle}
          </a>`
        ).join('');

        /* Licencia seleccionada → mensaje email */
        const selLic   = b.licenses.find(l => l.id === selectedLic[b.id]);
        const licLabel = selLic
          ? `${selLic.label} ${selLic.detail} (${selLic.price})`
          : '(sin licencia seleccionada)';

        const mailSub  = encodeURIComponent(`Beat: ${b.name} — ROBV BEATSHOP`);
        const mailBody = encodeURIComponent(
          `Hola,\n\nMe interesa el beat "${b.name}" con licencia ${licLabel}. ¿Está disponible?\n\nGracias`
        );

        return `
        <div class="beat-row${expandedId === b.id ? ' expanded' : ''}" id="row-${b.id}" onclick="handleRowClick(event,${b.id})">
          <div style="display:flex;align-items:center;justify-content:center;">
            <span class="beat-num">${i + 1}</span>
            <button class="play-btn" onclick="togglePlay(${b.id})" aria-label="Reproducir ${b.name}">
              <i class="ti ${currentPlay === b.id ? 'ti-player-pause' : 'ti-player-play'}"></i>
            </button>
          </div>
          <div class="beat-info">
            <div class="beat-name">
              ${b.name}
              <span class="atags"> @yvngrobv${b.collabTags.length ? ' ' + b.collabTags.join(' ') : ''}</span>
            </div>
            <div class="beat-meta">${b.bpm} BPM</div>
            <div class="beat-taglist">${b.tags.map(t => `<span class="btag">${t}</span>`).join('')}</div>
          </div>
          <div class="beat-right">
            <span style="font-size:11px;color:#555;padding-right:4px;">${expandedId === b.id ? '▲' : '▼'}</span>
          </div>
        </div>

        <div class="license-panel${expandedId === b.id ? ' open' : ''}" id="lic-${b.id}">
          <div class="lic-section-title">Productores</div>
          <div class="producers-row">${pills}</div>

          <div class="lic-section-title">Elige tu licencia</div>
          <div class="lic-grid">
            ${b.licenses.map(l => `
              <div class="lic-card${selectedLic[b.id] === l.id ? ' selected' : ''}" onclick="selectLic(${b.id},'${l.id}')">
                <div class="lic-type">${l.label}</div>
                <div class="lic-detail">${l.detail}</div>
                <div class="lic-price-wrap">
              <span class="lic-price-orig">${l.orig}</span>
              <span class="lic-price">${l.price}</span>
            </div>
              </div>
            `).join('')}
          </div>

          <div class="tag-notice">Preview con tag cada pocos segundos. En la compra, el tag aparece solo una vez.</div>

          <div class="contact-block">
            <div class="contact-label">Selecciona una licencia y contáctame para confirmar la disponibilidad y cerrar la compra.</div>
            <div class="contact-row">
              <a class="contact-btn" href="${INSTAGRAM}" target="_blank" rel="noopener">
                <i class="ti ti-brand-instagram" aria-hidden="true"></i> Instagram
              </a>
              <a class="contact-btn" href="mailto:${EMAIL}?subject=${mailSub}&body=${mailBody}">
                <i class="ti ti-mail" aria-hidden="true"></i> Email
              </a>
            </div>
          </div>
        </div>`;

      }).join('');
    }

    /* Clic en el rectángulo: si viene del play-btn lo ignora */
    function handleRowClick(e, id) {
      if (e.target.closest('.play-btn')) return;
      toggleExpand(id);
    }

    function toggleExpand(id) {
      expandedId = (expandedId === id) ? null : id;
      render();
      if (expandedId) {
        setTimeout(() => {
          const el = document.getElementById('lic-' + id);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 50);
      }
    }

    function selectLic(beatId, licId) {
      selectedLic[beatId] = licId;
      render();
    }

    /* ── Player ── */
    let isPaused = false;
    let playHistory = [];  // historial de beats reproducidos

    function startBeat(id, skipHistory) {
      if (!skipHistory) history.push(id);
      if (timer) clearInterval(timer);
      if (currentPlay && currentPlay !== id) playHistory.push(currentPlay);
      if (playHistory.length > 50) playHistory.shift();
      history.push(id); currentPlay = id; fakeSec = 0; isPaused = false;
      const b   = beats.find(x => x.id === id);
      const aud = document.getElementById('aud');
      aud.src   = `previews/${b.file}`;
      aud.volume = parseFloat(document.getElementById('vol-slider').value);
      aud.play().catch(() => {});
      document.getElementById('player-bar').classList.add('visible');
      document.getElementById('pb-name').textContent = b.name;
      document.getElementById('pb-sub').textContent  = b.bpm + ' BPM';
      document.getElementById('pb-fill').style.width = '0%';
      document.getElementById('pb-cur').textContent  = '0:00';
      document.getElementById('pb-dur').textContent  = '0:' + String(PREV_SECS).padStart(2, '0');
      document.getElementById('pb-playpause').innerHTML = '<i class="ti ti-player-pause"></i>';
      if (typeof gtag !== 'undefined') gtag('event', 'play_beat', { beat_name: b.name, beat_id: b.id });
      render();
      timer = setInterval(() => {
        if (isPaused) return;
        fakeSec++;
        if (fakeSec >= PREV_SECS) { stopPlay(); return; }
        const pct = fakeSec / PREV_SECS * 100;
        document.getElementById('pb-fill').style.width = pct + '%';
        document.getElementById('pb-thumb').style.left = pct + '%';
        const m = Math.floor(fakeSec / 60), s = fakeSec % 60;
        document.getElementById('pb-cur').textContent = m + ':' + (s < 10 ? '0' : '') + s;
      }, 1000);
    }

    function togglePlay(id) {
      if (currentPlay === id || (currentPlay && !id)) {
        // mismo beat → pause/resume
        const aud = document.getElementById('aud');
        if (isPaused) {
          aud.play().catch(() => {});
          isPaused = false;
          document.getElementById('pb-playpause').innerHTML = '<i class="ti ti-player-pause"></i>';
        } else {
          aud.pause();
          isPaused = true;
          document.getElementById('pb-playpause').innerHTML = '<i class="ti ti-player-play"></i>';
        }
        return;
      }
      startBeat(id);
    }

    function stopPlay() {
      if (timer) clearInterval(timer);
      document.getElementById('aud').pause();
      currentPlay = null; isPaused = false;
      document.getElementById('player-bar').classList.remove('visible');
      render();
    }

    let history = [];

    function nextPlay() {
      if (!currentPlay) return;
      const filtered = beats.filter(b => currentFilter === 'all' || b.tags.includes(currentFilter));
      const idx = filtered.findIndex(b => b.id === currentPlay);
      const next = filtered[(idx + 1) % filtered.length];
      startBeat(next.id);
    }

    function prevPlay() {
      if (history.length < 2) return;
      history.pop(); // quitar actual
      const prev = history[history.length - 1]; // ver el anterior sin sacarlo
      startBeat(prev, true); // skipHistory=true para no duplicar
    }

    function openBeatPanel() {
      if (!currentPlay) return;
      const targetId = currentPlay;
      // asegurar que estamos en catálogo sin resetear expandedId
      document.querySelectorAll('.hero-nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.hero-nav-btn[onclick*=\'catalog\']').classList.add('active');
      document.getElementById('catalog-wrap').style.display  = 'block';
      document.getElementById('credits-wrap').style.display  = 'none';
      document.querySelector('.filters-wrap').style.display  = 'block';
      document.querySelector('.section-lbl').style.display   = 'block';
      expandedId = targetId;
      render();
      setTimeout(() => {
        const el = document.getElementById('lic-' + targetId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 80);
    }

    function randomPlay() {
      const filtered = beats.filter(b => {
      const matchTag = currentFilter === 'all' || b.tags.includes(currentFilter);
      if (!searchQuery) return matchTag;
      const haystack = (b.name + ' ' + b.raw).toLowerCase();
      return matchTag && haystack.includes(searchQuery);
    });
      const rand = filtered[Math.floor(Math.random() * filtered.length)];
      startBeat(rand.id);
    }

    function setVolume(val) {
      document.getElementById('aud').volume = parseFloat(val);
    }

    // Seek mejorado con drag
    const progTrack = document.getElementById('prog-track');
    let isDragging = false;

    function seekToPos(clientX) {
      if (!currentPlay) return;
      const r   = progTrack.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
      fakeSec   = Math.round(pct * PREV_SECS);
      document.getElementById('pb-fill').style.width = (pct * 100) + '%';
      document.getElementById('pb-thumb').style.left = (pct * 100) + '%';
      const aud = document.getElementById('aud');
      if (aud.duration) aud.currentTime = pct * aud.duration;
      const m = Math.floor(fakeSec / 60), s = fakeSec % 60;
      document.getElementById('pb-cur').textContent = m + ':' + (s < 10 ? '0' : '') + s;
    }

    progTrack.addEventListener('mousedown', function(e) { isDragging = true; seekToPos(e.clientX); });
    progTrack.addEventListener('touchstart', function(e) { isDragging = true; seekToPos(e.touches[0].clientX); }, {passive:true});
    document.addEventListener('mousemove', function(e) { if (isDragging) seekToPos(e.clientX); });
    document.addEventListener('touchmove', function(e) { if (isDragging) seekToPos(e.touches[0].clientX); }, {passive:true});
    document.addEventListener('mouseup', function() { isDragging = false; });
    document.addEventListener('touchend', function() { isDragging = false; });

    buildFilters();
    render();
  </script>
</body>
</html>
